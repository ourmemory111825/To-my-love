<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 6 Months Anniversary Babeeee ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   GENERAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    position:relative;
}

.countdown{
    text-align:center;
    margin-top:10px;

    font-size:1.2rem;
    font-weight:500;

    color:#ffb6c1;

    letter-spacing:1px;
}

/* =========================
   FLOATING HEARTS
========================= */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
    z-index:-1;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:rgba(255,255,255,0.15);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

/* =========================
   TITLE
========================= */

.title{
    text-align:center;
    padding-top:30px;
}

.title h1{
    font-family:'Dancing Script',cursive;
    font-size:3.2rem;
}

.counter{
    margin-top:10px;
    opacity:0.8;
}

/* =========================
   SCENE
========================= */

.scene{
    width:100%;
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1200px;
}

/* =========================
   CAROUSEL
========================= */

.carousel{
    position:relative;
    width:320px;
    height:320px;
    transform-style:preserve-3d;
    cursor:grab;
}

/* =========================
   CARDS
========================= */

.card{
    position:absolute;
    width:140px;
    height:180px;
    left:50%;
    top:50%;
    margin:-90px -70px;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 12 PHOTOS */

.card:nth-child(1){ transform:rotateY(0deg) translateZ(450px); }
.card:nth-child(2){ transform:rotateY(30deg) translateZ(450px); }
.card:nth-child(3){ transform:rotateY(60deg) translateZ(450px); }
.card:nth-child(4){ transform:rotateY(90deg) translateZ(450px); }
.card:nth-child(5){ transform:rotateY(120deg) translateZ(450px); }
.card:nth-child(6){ transform:rotateY(150deg) translateZ(450px); }
.card:nth-child(7){ transform:rotateY(180deg) translateZ(450px); }
.card:nth-child(8){ transform:rotateY(210deg) translateZ(450px); }
.card:nth-child(9){ transform:rotateY(240deg) translateZ(450px); }
.card:nth-child(10){ transform:rotateY(270deg) translateZ(450px); }
.card:nth-child(11){ transform:rotateY(300deg) translateZ(450px); }
.card:nth-child(12){ transform:rotateY(330deg) translateZ(450px); }

/* =========================
   SLIDER
========================= */

.scroll-container{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

input[type=range]{
    width:300px;
}

/* =========================
   BUTTONS
========================= */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.circle-btn{
    width:75px;
    height:75px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:30px;
    cursor:pointer;
    backdrop-filter:blur(10px);
}

/* =========================
   APP VIEWER
========================= */

.app-viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.app-viewer img{
    max-width:95%;
    max-height:70%;
    object-fit:contain;
    border-radius:15px;
}

.viewer-text{
    margin-top:20px;
    font-family:'Dancing Script',cursive;
    font-size:1.6rem;
    text-align:center;
    padding:0 20px;
    line-height:1.6;
}

.viewer-close{
    position:absolute;
    top:20px;
    right:25px;
    font-size:2.5rem;
    cursor:pointer;
}

/* =========================
   ENVELOPE
========================= */

.envelope-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999;
    flex-direction:column;
}

.envelope{
    position:relative;
    width:320px;
    height:220px;
    background:#ffb6c1;
    border-radius:10px;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff8fab;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:1s;
}

.letter{
    position:absolute;

    width:95%;
    max-width:700px;

    height:420px;

    background:white;
    color:#222;

    left:50%;
    top:10px;

    transform:translateX(-50%) translateY(40px);

    border-radius:18px;

    padding:35px;

    overflow-y:auto;

    opacity:0;

    transition:1s;

    /* NEW FONT */
    font-family:'Poppins',sans-serif;

    font-size:1.15rem;

    font-weight:400;

    line-height:2;

    white-space:pre-line;

    text-align:left;

    box-shadow:0 15px 40px rgba(0,0,0,0.35);

    letter-spacing:0.3px;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

.envelope.open .letter{
    transform:translateX(-50%) translateY(-180px);
    opacity:1;
}

/* =========================
   LOVE JAR
========================= */

.jar-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    z-index:99999;
}

.jar-box{
    width:85%;
    max-width:500px;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    text-align:center;
}

.jar-message{
    margin-top:20px;
    font-family:'Dancing Script',cursive;
    font-size:2rem;
    line-height:1.5;
}

/* =========================
   MUSIC BUTTON
========================= */

.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    border:none;
    border-radius:30px;
    padding:12px 18px;
    cursor:pointer;
    z-index:999999;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .scene{
        height:50vh;
    }

    .carousel{
        width:220px;
        height:220px;
    }

    .card{
        width:100px;
        height:130px;
        margin:-65px -50px;
    }

    .card:nth-child(1){ transform:rotateY(0deg) translateZ(280px); }
    .card:nth-child(2){ transform:rotateY(30deg) translateZ(280px); }
    .card:nth-child(3){ transform:rotateY(60deg) translateZ(280px); }
    .card:nth-child(4){ transform:rotateY(90deg) translateZ(280px); }
    .card:nth-child(5){ transform:rotateY(120deg) translateZ(280px); }
    .card:nth-child(6){ transform:rotateY(150deg) translateZ(280px); }
    .card:nth-child(7){ transform:rotateY(180deg) translateZ(280px); }
    .card:nth-child(8){ transform:rotateY(210deg) translateZ(280px); }
    .card:nth-child(9){ transform:rotateY(240deg) translateZ(280px); }
    .card:nth-child(10){ transform:rotateY(270deg) translateZ(280px); }
    .card:nth-child(11){ transform:rotateY(300deg) translateZ(280px); }
    .card:nth-child(12){ transform:rotateY(330deg) translateZ(280px); }

    .title h1{
        font-size:2.4rem;
    }

    .viewer-text{
        font-size:1.3rem;
    }

    input[type=range]{
        width:80%;
    }

    .letter{

    width:92%;

    height:420px;

    font-size:1rem;

    line-height:1.9;

    padding:25px;

    border-radius:15px;
    }
}

</style>
</head>

<body>

<!-- HEARTS -->
<div class="hearts" id="hearts"></div>

<!-- TITLE -->
<div class="title">
    <h1>Happy 6 Months Anniversary Babeeee ❤️</h1>
    <div class="counter" id="counter"></div>

<div class="countdown" id="countdown"></div>

<!-- CAROUSEL -->
<div class="scene">

<div class="carousel" id="carousel">

<div class="card" data-msg="Our first photo together ❤️ (just right before we took the photo in the photo booth)

</div>
</div>

<!-- SLIDER -->
<div class="scroll-container">
<input type="range" min="0" max="360" value="0" id="slider">
</div>

<!-- BUTTONS -->
<div class="buttons">
    <button class="circle-btn" onclick="openEnvelope()">💌</button>

</div>

<!-- APP VIEWER -->
<div class="app-viewer" id="appViewer">
    <div class="viewer-close" onclick="closeViewer()">×</div>

<div class="flap"></div>

</div>

<div class="jar-popup" id="jarPopup">

<div class="jar-box">

<div class="jar-message" id="jarMessage">
Click below ❤️
</div>

<br>

<button class="circle-btn" onclick="randomLove()">❤️</button>

<br><br>

<button onclick="closeJar()">Close</button>

</div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<script>

/* FLOATING HEARTS */

const heartsContainer = document.getElementById("hearts");

setInterval(()=>{

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize = (Math.random()*20 + 15) + "px";

    heart.style.animationDuration = (Math.random()*5 + 5) + "s";

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);

},500);

/* COUNTER */

const startDate = new Date("2025-11-18");

function updateCounter(){

    const now = new Date();

    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));

    const hours = Math.floor(diff / (1000*60*60)) % 24;

    document.getElementById("counter").innerHTML =
    `Together for ${days} days ${hours} hours ❤️`;
}

const countdownEl = document.getElementById("countdown");

// Set target date: 15 September 2026 (you can change year if needed)
const targetDate = new Date("2026-09-15T00:00:00");

function updateCountdown(){

    const now = new Date();
    const diff = targetDate - now;

    if(diff <= 0){
        countdownEl.innerHTML = "I'm coming back to you ❤️";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    countdownEl.innerHTML =
        `Countdown until we meet again ❤️<br>
        <b>${days}</b> days 
        <b>${hours}</b> hours 
        <b>${minutes}</b> min 
        <b>${seconds}</b> sec`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

setInterval(updateCounter,1000);

updateCounter();

/* CAROUSEL */

const carousel = document.getElementById("carousel");

const slider = document.getElementById("slider");

let rotation = 0;

let dragging = false;

let autoSpin = true;

let paused = false;

let startX = 0;

function update(){

    carousel.style.transform = `rotateY(${rotation}deg)`;
}

function animate(){

    if(!paused && autoSpin && !dragging){

        rotation += 0.15;

        slider.value = rotation;

        update();
    }

    requestAnimationFrame(animate);
}

animate();

slider.addEventListener("input",(e)=>{

    rotation = e.target.value;

    update();

    autoSpin = false;

    clearTimeout(window.spinBack);

    window.spinBack = setTimeout(()=>{
        autoSpin = true;
    },2000);

});

/* DRAG */

carousel.addEventListener("mousedown",(e)=>{
    dragging = true;
    startX = e.clientX;
});

document.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    rotation += (e.clientX - startX) * 0.3;

    slider.value = rotation;

    update();

    startX = e.clientX;
});

document.addEventListener("mouseup",()=>{
    dragging = false;
});

/* TOUCH */

carousel.addEventListener("touchstart",(e)=>{
    dragging = true;
    startX = e.touches[0].clientX;
});

carousel.addEventListener("touchmove",(e)=>{

    if(!dragging) return;

    rotation += (e.touches[0].clientX - startX) * 0.3;

    slider.value = rotation;

    update();

    startX = e.touches[0].clientX;
});

carousel.addEventListener("touchend",()=>{
    dragging = false;
});

/* APP VIEWER */

const appViewer = document.getElementById("appViewer");

const viewerImg = document.getElementById("viewerImg");

const viewerText = document.getElementById("viewerText");

const cards = document.querySelectorAll(".card");

let currentIndex = 0;

cards.forEach((card,index)=>{

    card.addEventListener("click",()=>{

        paused = true;

        currentIndex = index;

        viewerImg.src = card.querySelector("img").src;

        viewerText.innerText = card.dataset.msg;

        appViewer.style.display = "flex";
    });

});

appViewer.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
});

appViewer.addEventListener("touchend",(e)=>{

    let endX = e.changedTouches[0].clientX;

    let diff = endX - startX;

    if(Math.abs(diff) > 50){

        if(diff < 0){
            currentIndex = (currentIndex + 1) % cards.length;
        }else{
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        }

        viewerImg.src = cards[currentIndex].querySelector("img").src;

        viewerText.innerText = cards[currentIndex].dataset.msg;
    }
});

function closeViewer(){

    appViewer.style.display = "none";

    paused = false;
}

/* ENVELOPE */

const envelopePopup = document.getElementById("envelopePopup");

const envelope = document.getElementById("envelope");

const letterText = document.getElementById("letterText");

const fullLetter = `❤️❤️❤️ My Love Letter ❤️❤️❤️

To my love, 我的黄, MY QUEEN ❤️

Happy 6 months anniversary babe!!!
I still can't believe it's already been 6 months.

Time passes so fast lately, and I'm really sorry I can't be right beside you to celebrate our 6 months anniversary.

I love you so much ❤️

I know sometimes I can be a bit much to handle, especially when I’m gaming or talking with my friends.

And sometimes when I’m upset I don’t reply fast — most of the time it’s just because my phone is on mute, not because I don’t care.

Right now I know I'm not the perfect boyfriend you've always wanted.

There are still alot of things for me to improve.

But I want you to know that everyday I am trying to become a better boyfriend for you, even if it's just a little bit at a time.

Thank you for staying with me for the past 6 months ❤️

And thank you for being patient with me, changing together with me, and always staying by my side.

I really appreciate it babe 🥹❤️

I hope we can stay together for as long as we live, even when times are hard.

No matter where we are,
Guangzhou or Medan,
my heart will always choose you ❤️

❤️ Calvin`;

function openEnvelope(){

    paused = true;

    envelopePopup.style.display = "flex";

    envelope.classList.remove("open");

    letterText.innerHTML = "";

    setTimeout(()=>{

        envelope.classList.add("open");

        typeWriter(fullLetter,0);

    },600);
}

function closeEnvelope(){

    envelopePopup.style.display = "none";

    paused = false;
}

function typeWriter(text,index){

    if(index < text.length){

        const char = text.charAt(index);

        letterText.innerHTML += char;

        letterText.scrollTop = letterText.scrollHeight;

        setTimeout(()=>{
            typeWriter(text,index+1);
        },20);
    }
}

/* LOVE JAR */

const jarPopup = document.getElementById("jarPopup");

const messages = [

"Your eyes ❤️",
"Your smile ❤️",
"Your laugh ❤️",
"The way you care about me ❤️",
"Your voice ❤️",
"The way you look at me ❤️",
"How patient you are ❤️",
"How cute you are ❤️",
"My hardworking girlfriend ❤️",
"Cutie girlfriend ❤️",
"Prettiest girl ever ❤️",
"Everything about you ❤️"

];

function openJar(){

    paused = true;

    jarPopup.style.display = "flex";
}

function closeJar(){

    jarPopup.style.display = "none";

    paused = false;
}

function randomLove(){

    const random = Math.floor(Math.random()*messages.length);

    document.getElementById("jarMessage").innerText = messages[random];
}

/* MUSIC */

const music = document.getElementById("bgMusic");

let musicStarted = false;

document.addEventListener("click",()=>{

    if(!musicStarted){

        music.play().catch(()=>{});

        musicStarted = true;
    }

},{once:true});

function toggleMusic(){

    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

</script>

</body>
</html>
